apiVersion: v1
kind: Namespace
metadata:
  name: replicator

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: replicator
  namespace: replicator

---
# ClusterRole: allow read/list/watch on secrets/configmaps and namespace access,
# and create/update/patch in target namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: replicator-clusterrole
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: replicator-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: replicator-clusterrole
subjects:
  - kind: ServiceAccount
    name: replicator
    namespace: replicator

---
# Deployment of the replicator operator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-replicator
  namespace: replicator
  labels:
    app: kubernetes-replicator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-replicator
  template:
    metadata:
      labels:
        app: kubernetes-replicator
    spec:
      serviceAccountName: replicator
      containers:
        - name: replicator
          # image may be overridden to a mirror if needed
          image: stakater/kubernetes-replicator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: WATCH_NAMESPACE
              value: ""
            - name: LOG_LEVEL
              value: "info"
          resources:
            limits:
              cpu: "200m"
              memory: "200Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
